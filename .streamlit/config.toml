# .streamlit/config.toml — BEAR-HUB runtime settings.
# Only values that differ from Streamlit defaults are listed.

[client]
# BEAR-HUB renders its own tool-navigation sidebar (see utils/page.py::render_tool_sidebar).
# Hide Streamlit's auto-generated page list so we don't show two navigators.
showSidebarNavigation = false

[server]
headless = false

[browser]
gatherUsageStats = false

[theme.light]
primaryColor = "#1D4A6B"
backgroundColor = "#CDCDC8"
secondaryBackgroundColor = "#2A6FA1"
textColor = "#00000"

[theme.dark]
primaryColor = "#368AC8"
backgroundColor = "#282a36"
secondaryBackgroundColor = "#44475a"
textColor = "#f8f8f2"
