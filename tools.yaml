# BEAR-HUB — Tool registry
#
# Single source of truth for every tool the hub exposes.
# The hub iterates this list to render cards and sidebar navigation,
# so adding a new tool is a 2-step change:
#   1. Append a new entry here.
#   2. Drop a pages/<NAME>.py file that calls utils.init_page(...).
#
# Fields:
#   id          — stable slug used for session namespacing and run-history filters.
#   name        — display name.
#   tagline     — optional short subtitle shown under the name.
#   page        — path to the Streamlit page file, relative to project root.
#   icon        — emoji shown on the nav card/button.
#   status      — "stable" | "beta" | "wip"; controls button style and badge.
#   category    — grouping hint ("pipeline", "post-processing", "outbreak", …).
#   description — one or two sentences shown on the hub card.

- id: bactopia
  name: Bactopia
  tagline: Main Pipeline
  page: pages/BACTOPIA.py
  icon: "🦠"
  status: stable
  category: pipeline
  description: >
    Automatically builds a FOFN, assembles the Bactopia command
    and runs it via Nextflow (async).

- id: bactopia-tools
  name: Bactopia Tools
  page: pages/BACTOPIA-TOOLS.py
  icon: "🧰"
  status: stable
  category: post-processing
  description: >
    Runs amrfinderplus, rgi, abricate, mobsuite, mlst, pangenome,
    mashtree on completed samples.

- id: merlin
  name: Bactopia MERLIN
  page: pages/MERLIN.py
  icon: "🧙🏻"
  status: stable
  category: species-specific
  description: Runs species-specific workflows on completed samples.

- id: port
  name: PORT
  tagline: Plasmid Outbreak Investigation Tool
  page: pages/PORT.py
  icon: "🍷"
  status: wip
  category: outbreak
  description: >
    Wrapper to run PORT for plasmid-focused outbreak investigations.
